<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
}

/* Glass Card */
.card {
    width: 90%;
    max-width: 400px;
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.08);
}

/* Title */
.title {
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Subtitle */
.subtitle {
    font-size: 15px;
    color: #bbb;
    margin: 15px 0;
}

/* Button Ultra Glow */
.btn {
    display: inline-block;
    width: 100%;
    padding: 15px;
    font-size: 18px;
    color: #fff;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border-radius: 15px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
    animation: ultraGlow 1.5s infinite;
}

@keyframes ultraGlow {
    0% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(0,198,255,0.5);
    }
    50% {
        transform: scale(0.9);
        box-shadow: 0 0 35px rgba(0,198,255,1);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(0,198,255,0.5);
    }
}

/* Countdown */
.countdown {
    color: #ff4d4d;
    font-weight: bold;
    margin: 15px 0;
    font-size: 18px;
}

/* List */
.list {
    text-align: left;
}

.list p {
    margin: 8px 0;
    font-size: 16px;
    color: #ddd;
}

/* Bottom box */
.bottom-box {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    font-weight: bold;
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.08);
}
</style>

</div>

<script>
let time = 7;
let timer = document.getElementById("timer");

setInterval(() => {
    if(time > 0){
        time--;
        timer.innerText = time;

}, 1000);
</script>
